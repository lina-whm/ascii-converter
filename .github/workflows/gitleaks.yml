name: Gitleaks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Gitleaks
        run: go install github.com/gitleaks/gitleaks/v9@latest

      - name: Run Gitleaks
        run: gitleaks detect --source . --config-path .gitleaks.toml --no-color --exit-code
