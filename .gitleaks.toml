[allowlist]
paths = [
  "node_modules",
  "\\.git",
  "\\.next",
  "package\\.json",
  "README\\.md",
  "\\.example$",
  "\\.gitignore$"
]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey|secret[_-]?key|access[_-]?token|auth[_-]?token)\s*[=:]\s*["\']?[a-zA-Z0-9]{16,45}'''

[[rules]]
id = "generic-secret"
description = "Generic Secret"
regex = '''(?i)(password|passwd|pwd|secret|token|auth)\s*[=:]\s*["\']?[a-zA-Z0-9]{8,}'''

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''AKIA[0-9A-Z]{16}'''

[[rules]]
id = "github-token"
description = "GitHub Personal Access Token"
regex = '''gh[pousr]_[A-Za-z0-9_]{36,251}'''

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''

[[rules]]
id = "connection-string"
description = "Connection String"
regex = '''(?i)(postgres|mysql|mongodb|redis|amqp|rabbitmq)?\\??connection[_-]?(string|uri|url)\s*[=:]\s*["\']?[a-zA-Z0-9:@/\-._?=&%;+]+["\']?'''

[[rules]]
id = "slack-token"
description = "Slack Token"
regex = '''xox[baprs]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24,}'''
